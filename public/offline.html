<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Noes Planer | Offline</title>
    <style>
      :root {
        color-scheme: light;
        --bg-primary: #f4efe8;
        --bg-card: rgba(255, 255, 255, 0.92);
        --text-primary: #4c463f;
        --text-secondary: #7f786f;
        --border-color: #e6dfd7;
        --accent-primary: #8d7cf6;
        --shadow-lg: 0 28px 52px rgba(88, 75, 57, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.88), transparent 28%),
          linear-gradient(180deg, #f8f4ee 0%, #f1ebe3 100%);
        color: var(--text-primary);
        font-family: "Manrope", "Segoe UI Variable", "Segoe UI", sans-serif;
      }

      main {
        width: min(100%, 560px);
        padding: 32px;
        border: 1px solid var(--border-color);
        border-radius: 28px;
        background: var(--bg-card);
        box-shadow: var(--shadow-lg);
      }

      .eyebrow {
        margin: 0;
        color: var(--text-secondary);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        margin: 14px 0 0;
        font-size: clamp(32px, 5vw, 44px);
        line-height: 0.95;
        letter-spacing: -0.06em;
      }

      p {
        margin: 18px 0 0;
        color: var(--text-secondary);
        font-size: 15px;
        line-height: 1.7;
      }

      button {
        margin-top: 24px;
        border: 0;
        border-radius: 999px;
        padding: 13px 18px;
        background: linear-gradient(135deg, #8d7cf6, #7b68ea);
        color: #ffffff;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button:hover {
        filter: brightness(1.03);
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Offline</p>
      <h1>Keine Verbindung verfuegbar</h1>
      <p>
        Noes Planer ist installiert, aber fuer aktuelle Daten brauchst du wieder
        eine Internetverbindung. Sobald du online bist, kannst du die App neu laden.
      </p>
      <button type="button" onclick="window.location.reload()">
        Erneut versuchen
      </button>
    </main>
    <script>
      window.addEventListener("online", () => window.location.reload());
    </script>
  </body>
</html>
